# Publish gif2vtf to PyPI when a GitHub Release is published.
# Uses PyPI trusted publishing (OIDC) — no API token stored in GitHub secrets.
#
# One-time setup:
#   1. PyPI: add a trusted publisher for this repo (see README "Releasing").
#   2. GitHub: create a "pypi" environment (Settings → Environments).
#   3. Create a GitHub Release to trigger the upload.

name: Publish Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/gif2vtf/${{ github.event.release.tag_name }}
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
